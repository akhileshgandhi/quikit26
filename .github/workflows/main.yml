name: GHCR Build and Push

on:
  push:
    branches: [main, uat, dev]
    # This trigger will now catch any changes in the QuikIT folder
    paths:
      - 'QuikIT/**'
      # - '.github/workflows/ghcr-ci.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        app: [quikit, admin, quikscale]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # Context MUST be the folder containing the 'apps' and 'packages' folders
          context: ./QuikIT
          # File path is relative to the repository root
          file: ./QuikIT/apps/${{ matrix.app }}/Dockerfile
          push: true
          # Tags using your actual repository path
          tags: |
            ghcr.io/${{ github.repository_owner }}/quikit26/${{ matrix.app }}:latest
            ghcr.io/${{ github.repository_owner }}/quikit26/${{ matrix.app }}:${{ github.sha }}
          # Next.js build-time arguments
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy
            NEXTAUTH_URL=http://localhost:3000
